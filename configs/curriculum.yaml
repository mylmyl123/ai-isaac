# Isaac RL PPO curriculum config.
#
# Post 2026-07-14 Phase-1 rewrite. Prior Stage A run showed regression from
# 10.8 → 5.3 kills/ep because:
#   * LR annealing → 0 froze the policy in local optimum
#   * ent_coef=0.01 gave entropy gradient 3-8× the reward gradient
#   * Task design (sealed room + homing Attack Fly) is degenerate:
#     corner-camping local optimum is stable, can't be escaped.
#
# This config fixes all three (see swarm-outputs/01-red-team-audit.md,
# swarm-outputs/03-first-principles.md).
#
# Curriculum stages (used across the paper's experiments):
#   0  1 Horf (stationary shooter). Provably ANTI-camp. Control task.        (~2 hr)
#   A  1 Attack Fly (homing). Reproducer for corner-camping failure mode.    (~2 hr)
#   B  3 Attack Flies. Multi-enemy target selection.                         (~3 hr)
#   D  Normal Basement 1 room, vanilla enemies. Real single-room combat.    (~4 hr)
#   E  Full Basement 1 run. Full generalization test.                        (~8+ hr)

# ---- Curriculum -----------------------------------------------------------
stage: "0"                        # Phase-1 default: Horf (anti-camp control task)
run_name: cleanrl_ppo_stage0

# ---- Env fleet ------------------------------------------------------------
# Phase-3 (2026-07-15): scaled up. The CNN perceives the enemy but a 2-env /
# 256-batch run learned only "survive" (kills declined 1.0->0.1). More envs =
# bigger batch so the rare kill signal survives advantage-norm. Episodes cut to
# 500 so "survive to the 1800 cap without killing" is no longer the easy optimum.
n_envs: 8
base_port: 9500
reset_stage: 1                    # Basement 1
max_episode_steps: 500

total_env_steps: 1_000_000        # Phase-3: more steps for the scaled run

# ---- PPO hyperparameters (Phase-1 tuned) ---------------------------------
# Phase 2 (2026-07-14): rollout_length 128 -> 512. A Stage-0/A episode is
# ~300-800 ticks; a 128-step rollout (batch 256 w/ 2 envs) ends mid-episode
# every time, so ~100% of advantage targets were bootstrap-dominated. 512
# ≈ one episode, cutting bootstrap reliance at ~zero extra compute (same
# total_env_steps, fewer-but-larger updates). Do NOT raise n_envs instead:
# SyncVecEnv steps envs sequentially over blocking sockets, so more envs =
# fewer gradient updates at fixed budget.
rollout_length: 512
n_epochs: 4
n_minibatches: 4
lr: 3.0e-4
gamma: 0.995                      # was 0.99 — effective horizon 200 (matches ep_len)
gae_lambda: 0.95
clip_coef: 0.2
ent_coef: 0.01                    # Phase-3: raised back to 0.01 to keep the shoot
                                  # head exploring its 5 dirs until kills appear
                                  # (the 2-env run's shoot head stayed ~random)
vf_coef: 0.5
max_grad_norm: 0.5
anneal_lr: false                  # was true — DO NOT freeze the policy at end
lr_floor_frac: 0.1                # if anneal_lr=true, floor at 10% of base LR

# ---- Network --------------------------------------------------------------
hidden_dim: 256
n_hidden_layers: 2

# Input normalization (2026-07-15). Running mean/std over the obs, applied
# inside the network, clipped to [-10,10]. Fixes the Tanh saturation that made
# the policy blind to enemy position (a raw frame counter swamped the aim
# signal ~7600:1). true = on (default). Set false for the ablation arm.
normalize_obs: true

# ---- Runtime --------------------------------------------------------------
device: cuda
seed: 42
checkpoint_dir: runs
checkpoint_every: 50_000          # more frequent so we can inspect intermediate policies
log_every_updates: 1

# ---- Action masking (Phase-1) ---------------------------------------------
# Stages 0, A, B don't need item/bomb/pillcard actions. Masking them at
# sample time removes entropy leakage from the 3 useless factors.
mask_unused_action_factors: true

# ---- Reward (Phase-3 rebalance, 2026-07-15) -------------------------------
# The 2-env run showed the reward taught SURVIVAL not aiming: idle bleed
# (-2 to -5.6/ep) dwarfed the kill reward (+1.4/ep), so PPO learned to loiter.
# Rebalanced so killing strictly dominates: r_kill raised to +3, idle softened
# (-0.002, grace 20). Verified: survive-no-kill nets ~-1.5, a killer nets +22
# to +47 — the gradient now points at killing, and the idle term is a gentle
# nudge not the dominant signal.
r_kill: 3.0

# PBRS coefficient. 0.0 = off. (Potential-based shaping; kept for later.)
pbrs_coef: 0.0

# Dense per-hit reward. SUPERSEDED (park-and-spray exploit). 0.0 = off.
r_hit: 0.0

# Idle penalty ("time since last kill"). Phase-3: softened (-0.002, grace 20)
# so it nudges against loitering without dominating the +3 kill reward. Counter
# resets on kill, frozen while no enemy on screen. r_idle=0.0 disables.
r_idle: -0.002
idle_grace: 20

# ---- Closer-spawn curriculum ----------------------------------------------
# Phase-3: bootstrap first kills with a CLOSE spawn so accidental hits happen
# and seed the gradient. Anneal back to 200-500 (full anti-camp task) once
# kills are climbing (relaunch with wider band).
spawn_min: 90
spawn_max: 170


