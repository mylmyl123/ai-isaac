# DreamerV3 — Stage 2: floor clear on Basement 1.
#
# After Stage 1 hits ~90% room-clear rate, resume from that checkpoint
# and run this. Longer max_episode_steps (~10 rooms), lower per-room
# reward density, higher discount to value multi-room strategy.

run_name: dreamer_stage2_floor_clear

# ---- env ----
n_envs: 2
base_port: 9500
reset_stage: 1
max_episode_steps: 9000                  # ~10 rooms * ~15 min at 15 Hz
total_env_steps: 20_000_000

launch_isaac: false
isaac_binary: null
accept_timeout_s: 300.0

# ---- runtime ----
device: cuda
seed: 42
checkpoint_dir: runs
checkpoint_every: 500_000
log_every: 50

# ---- encoder / decoder (same as stage1) ----
encoder_embed_dim: 1024
encoder_trunk_dim: 768
decoder_hidden: 512
decoder_layers: 2

# ---- RSSM ----
rssm_stoch: 32
rssm_discrete: 32
rssm_deter: 512
rssm_hidden: 512
rssm_rec_depth: 1
rssm_act: SiLU
rssm_norm: true
rssm_min_std: 0.1
rssm_unimix_ratio: 0.01
rssm_initial: learned

# ---- world model ----
world_model_lr: 1.0e-4
world_model_eps: 1.0e-8
world_model_grad_clip: 1000.0
weight_decay: 0.0
batch_size: 16
seq_len: 64
kl_free_bits: 1.0
kl_dyn_scale: 0.5
kl_rep_scale: 0.1
reward_loss_scale: 1.0
cont_loss_scale: 1.0

# ---- actor + critic ----
actor_lr: 3.0e-5
critic_lr: 3.0e-5
actor_hidden: 512
actor_layers: 2
critic_hidden: 512
critic_layers: 2
actor_grad_clip: 100.0
critic_grad_clip: 100.0
actor_entropy: 3.0e-4
imag_horizon: 15
gamma: 0.997
gae_lambda: 0.95
unimix_ratio: 0.01

# ---- reward + value heads ----
value_atoms: 255
value_v_min: -20.0
value_v_max: 20.0
reward_head_layers: 2
cont_head_layers: 2

# ---- slow critic + reward EMA ----
slow_target: true
slow_target_update: 1
slow_target_fraction: 0.02
reward_ema: true

# ---- training loop ----
prefill_steps: 5000
train_ratio: 16
replay_capacity: 1_000_000

# ---- reward (stage2: emphasize progression, less per-room shaping) ----
reward:
  r_step: -0.001
  r_room_clear: 2.0
  r_new_room: 3.0
  r_backtrack: -0.5
  r_door_distance_shaping: 0.2
  r_room_clear_speed_bonus: 0.5
  r_room_clear_no_damage: 1.0
  r_seek_door_when_clear: 0.02          # small nudge toward exit doors
  r_aim_at_enemy: 0.01
  r_damage_dealt_scale: 0.2
  max_damage_reward_per_room: 6.0
  r_full_hp_tick: 0.001
  r_idle_penalty: -0.05
  r_idle_death: -20.0
  idle_death_ticks: 300
  r_stationary_penalty: -0.05
  r_pbrs_scale: 0.1
  pbrs_gamma: 0.997
  pbrs_ideal_dist: 200.0
  pbrs_decay: 200.0
  # Floor-descent bonus (main new signal for stage 2).
  r_floor_cleared: 10.0
