# DreamerV3-XS — Stage 1: single-room combat, optimized for RTX 3060 Ti (~13 TFLOPS, 8 GB).
#
# 2026-07-05: created after diagnostic run on 3060 Ti at 100% GPU showed the
# default config runs at ~0.5 sps (WM-update-bound). This variant shrinks
# the world model, encoder, decoder, and batch dimensions so throughput
# targets 15-25 sps on the 3060 Ti — the "Dreamer-XS" tier from Danijar's
# post-paper size sweep.
#
# 2026-07-05 REV: user wants max quality-per-step within a ~1-week budget.
# Reverted seq_len 16 -> 32 (better temporal credit assignment). Kept the
# XS model dims (RSSM 256, encoder 512, decoder 256). Kept pure-speedup
# optimizations: AMP bf16, shared-trunk decoder, TF32, cuDNN benchmark,
# torch.compile on RSSM. train_ratio bumped 4 -> 8 for 2x sample efficiency.
# Expected steady-state on 3060 Ti: 1.8-2.2 sps (was 2.65 at train_ratio=4).
#
# Compute footprint: ~5M WM params (was ~23M default). Halves memory and
# per-update compute by ~4x. Expected sample-efficiency loss vs full
# DreamerV3: ~20% (still ~5-10x more efficient than PPO on Isaac).
#
# When to use vs stage1_single_room.yaml:
#   - You have <16 GB VRAM or a consumer GPU (3060-tier or older).
#   - Your `perf/sps` on the default config is under 5.
#   - You want faster iteration during hyperparameter tuning.
#
# When NOT to use:
#   - You have an A100/H100/4090+ and want maximum sample efficiency.
#   - You've already validated stage1 convergence on XS and want to
#     push the sample-efficiency limit.

run_name: dreamer_stage1_single_room_xs

# ---- env ----
n_envs: 2
base_port: 9500
reset_stage: 1
max_episode_steps: 1800
total_env_steps: 5_000_000

launch_isaac: false
isaac_binary: null
accept_timeout_s: 300.0

# ---- runtime ----
device: cuda
seed: 42
checkpoint_dir: runs
checkpoint_every: 100_000       # was 250k — more frequent so daily inspection
                                # always has a fresh restore point.
log_every: 50

# torch.compile the RSSM. Needs Triton; broken on Windows in many
# PyTorch builds. Leave off unless you've confirmed Triton works on your
# box (import triton; triton.__version__ raises no error).
compile_rssm: false

# ---- encoder / decoder (XS: halved from default) --------------------
encoder_embed_dim: 512          # was 1024
encoder_trunk_dim: 384          # was 768
decoder_hidden: 256             # was 512
decoder_layers: 2

# ---- RSSM (XS: halved deter/hidden; kept 32x32 discrete stoch) ------
# The stochastic categorical state is the core representation; shrinking
# below 32x32 hurts sample efficiency disproportionately per Hafner's
# ablations. We shrink deter (GRU state) and hidden (MLP width) instead.
rssm_stoch: 32
rssm_discrete: 32
rssm_deter: 256                 # was 512
rssm_hidden: 256                # was 512
rssm_rec_depth: 1
rssm_act: SiLU
rssm_norm: true
rssm_min_std: 0.1
rssm_unimix_ratio: 0.01
rssm_initial: learned

# ---- world model training ------------------------------------------
world_model_lr: 1.0e-4
world_model_eps: 1.0e-8
world_model_grad_clip: 1000.0
weight_decay: 0.0
batch_size: 8                   # was 16 — halved (with seq_len 32 = 256 samples/update vs 1024)
seq_len: 32                     # was 64 -> 32. 32 gives the RSSM enough temporal window
                                # for stage1 credit assignment (episodes are ~200-500 ticks;
                                # 32 timesteps at 15 Hz = ~2 sec of game time per training
                                # window). Halving further (to 16) hurt quality-per-step
                                # more than the ~1.4x throughput gain was worth.
kl_free_bits: 1.0
kl_dyn_scale: 0.5
kl_rep_scale: 0.1
reward_loss_scale: 1.0
cont_loss_scale: 1.0

# ---- actor + critic ------------------------------------------------
actor_lr: 3.0e-5
critic_lr: 3.0e-5
actor_hidden: 256               # was 512
actor_layers: 2
critic_hidden: 256              # was 512
critic_layers: 2
actor_grad_clip: 100.0
critic_grad_clip: 100.0
# 2026-07-05: bumped 33x from paper default (3e-4) after v1 entropy collapse.
# 2026-07-06: 24h/110k run showed entropy stuck at 3.75/3.807 (98% uniform)
#   because entropy bonus (1e-2 * 3.75 = 0.0375) dominates reinforce signal
#   (log_prob * adv ~= 4 * 0.003 = 0.012). Drop to 3e-3 (still 10x paper) so
#   the two are comparable and actor can actually move off uniform.
actor_entropy: 3.0e-3
# 2026-07-09 v2: bumped from 15 -> 20 to give the critic a longer window
# for evaluating multi-step consequences of actions. Combined with the
# gamma bump below, effective planning horizon roughly doubles.
imag_horizon: 20
# 2026-07-09 v2: bumped from 0.997 -> 0.999 for longer effective horizon.
# At 0.997: rewards 100 steps away discounted to 0.74, 1000 steps to 0.05.
# At 0.999: rewards 100 steps at 0.905, 1000 steps at 0.37.
# This is essential for the agent to value chains that take 60+ seconds
# (shop-then-purchase, dungeon exploration, boss fight preparation).
# Higher gamma means higher-variance value estimates — offset by the
# slow_target critic and reward EMA which we already have.
gamma: 0.999
gae_lambda: 0.95
unimix_ratio: 0.01

# ---- reward + value heads ------------------------------------------
value_atoms: 255
value_v_min: -20.0
value_v_max: 20.0
reward_head_layers: 2
cont_head_layers: 2

# ---- slow critic + reward EMA --------------------------------------
slow_target: true
slow_target_update: 1
slow_target_fraction: 0.02
reward_ema: true

# ---- training loop -------------------------------------------------
prefill_steps: 2500
# train_ratio: WM grad-steps per env-step (total, across all envs).
# 2026-07-06 REV: bumped 4 -> 8 after 10h/100k analysis showed the agent
# was clearly learning (ep_reward_best 0 -> 37 monotonic climb) but slowly.
# GPU is at 93%; env is fast (1-8ms). Doubling gradient updates per env-step
# nets ~2x sample efficiency at ~30% throughput cost. Expected: convergence
# in ~half the env-steps (~1M vs ~2M), wall-clock ~4-5 days vs 6-8.
# 2026-07-07 REV: reverted 8 -> 4. The 24h/110k run showed SPS crashed to
# 1.24 (want >= 2). With the static_scan rewrite (commit e28bd3f) WM step
# is ~20% faster; combined with halved updates/env-step, env progress
# roughly doubles (est ~2.5 SPS). Updates/hour stays comparable because
# the individual update is faster. Sample-efficiency loss vs 8 is offset
# by 2x more diverse rollout data — net wins for exploration since
# kill/damage_dealt/new_room haven't fired once in the previous run.
train_ratio: 4                  # was 8
replay_capacity: 500_000        # 500K * ~7KB per obs ~= 3.5 GB RAM

# ---- reward (same as fixed stage1_single_room.yaml v2) --------------
# See stage1_single_room.yaml header for the full rationale on why these
# differ from the PPO shaping.
#
# 2026-07-09 REV: audit found `clear_idle_extra` contributed -2.83/ep (65%
# of the negative reward budget) as a policy-independent bias. Rebalanced
# via a 6x coefficient reduction + 30-tick grace period (see reward.py).
# Also re-enabled `r_seek_door_when_clear` — disabling it meant the agent
# had NO active gradient toward doors after clearing a room, which was
# the exact behavior the user noticed ("wanders aimlessly after clear").
#
# Added Phase B/C/D reward keys (2026-07-09) for state-delta pickup/use
# detection, room-type first-entry rewards, boss-kill bonus, and chain
# rewards for multi-step behaviors (bomb-then-secret, shop-purchase,
# active-item-ready-and-used). All defaults live in RewardConfig; the
# only override we set here is the fixes to what the audit called out.
reward:
  r_step: 0.0
  # 2026-07-09 v2: chain rewards removed (r_chain_*, chain_*_window_ticks).
  # Replaced by end-of-episode aggregate outcome bonuses + RND intrinsic
  # curiosity. See docs/audit-2026-07-09.md and reward.py header comments.
  # r_use_bomb: uses RewardConfig default of 0.02 (was 0.5) — small token
  # so bombs aren't spammed; real signal comes from downstream outcomes.
  # r_spend_coin: uses RewardConfig default of 0.0 — removed to avoid
  # slot-machine addiction; coin-to-collectible flow already rewarded.
  r_room_clear: 5.0
  r_new_room: 5.0
  r_backtrack: -0.3
  r_room_clear_speed_bonus: 1.0
  r_room_clear_no_damage: 1.5
  r_door_distance_shaping: 0.3
  # 2026-07-09: was 0.0 (disabled). Re-enabled at 0.05 so the agent has
  # an active per-tick gradient toward doors after clearing. Combined
  # with clear_idle_extra grace period, this gives the agent an actual
  # "leave the room" signal instead of just "don't idle".
  r_seek_door_when_clear: 0.05
  r_aim_at_enemy: 0.03
  r_shoot_when_enemy_visible: 0.0
  r_kill: 2.0
  r_damage_dealt_scale: 0.5
  max_damage_reward_per_room: 20.0
  r_at_kite_dist_tick: 0.0
  kite_dist_min: 100.0
  kite_dist_max: 300.0
  r_full_hp_tick: 0.0
  r_idle_penalty: 0.0
  idle_speed_threshold: 0.5
  r_idle_death: -5.0
  idle_death_ticks: 300
  idle_death_require_no_enemies: true
  r_stationary_penalty: 0.0
  stationary_radius: 40.0
  stationary_window: 45
  r_pbrs_scale: 0.3
  pbrs_gamma: 0.997
  pbrs_ideal_dist: 200.0
