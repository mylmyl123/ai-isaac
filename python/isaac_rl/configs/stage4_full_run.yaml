# Stage 4 — full six-floor run to Mom. Serious training run.
# Default fleet: 2 instances. Bump to 8 for real production runs.
run_name: stage4_full_run
n_envs: 2
rollout_steps: 256
total_env_steps: 500_000_000
minibatch_size: 256
n_epochs: 4
lr: 2.0e-4
lr_decay: true
gamma: 0.999
gae_lambda: 0.95
clip: 0.2
vf_coef: 0.5
ent_coef: 0.01
max_grad_norm: 0.5

use_rnd: true
rnd_coef: 0.02       # RND coefficient decayed after early curriculum stages
rnd_lr: 1.0e-4

base_port: 9500
reset_stage: 1
max_episode_steps: 27000

launch_isaac: false
isaac_binary: null
accept_timeout_s: 300.0

device: cuda
seed: 42
checkpoint_dir: runs
checkpoint_every: 2_000_000
log_every: 20

policy:
  entity_dim: 128
  proj_dim: 128
  pickup_dim: 64
  trunk_dim: 512
  gru_dim: 512
