# Stage 1 — single-room combat on Basement 1.
# Default fleet: 1 Isaac instance (safest — stable on any box).
# Bump n_envs to 2-8 on a beefier box; raise minibatch_size proportionally.
#
# Reward shaping is AGGRESSIVE by default — dense per-tick signals guide the
# policy toward productive behavior fast, which matters when compute is limited.
# See python/isaac_rl/reward.py for the full RewardConfig field list.

run_name: stage1_single_room
n_envs: 1
rollout_steps: 256
total_env_steps: 20_000_000
minibatch_size: 128           # n_envs * rollout_steps / 2 → 2 minibatches per epoch
n_epochs: 4
lr: 3.0e-4
lr_decay: true
gamma: 0.99            # short episodes; discount can be lower than the 6-floor gamma
gae_lambda: 0.95
clip: 0.2
vf_coef: 0.5
ent_coef: 0.02         # BUMPED from 0.005 after user report of policy collapse at 1M steps.
                       # Low ent_coef preserves BC weights but risks getting stuck in local
                       # optima (bot converged to "stand still forever"). 0.02 is a balance:
                       # BC weights survive early PPO but policy retains enough stochasticity
                       # to escape degenerate policies. For future runs starting from a
                       # BC-warm-started policy that's ALREADY collapsed, override to 0.05.
max_grad_norm: 0.5

# NEW (2026-07-02): PPO best-practice tricks from "What Matters in On-Policy RL"
# and standard implementations. All contribute to sample efficiency and
# gradient stability.
vf_clip: 0.2               # value-function clipping (analogous to policy clipping); 0 disables
normalize_rewards: true    # divide rewards by running std of returns before GAE
aux_coef: 0.1              # auxiliary supervised loss coefficient (representation learning); 0 disables

use_rnd: true
rnd_coef: 0.1
rnd_lr: 1.0e-4

base_port: 9500
reset_stage: 1
max_episode_steps: 1800

# Set to the absolute path of your isaac-ng / isaac.exe binary and flip launch_isaac.
launch_isaac: false
isaac_binary: null
accept_timeout_s: 300.0

device: cuda
seed: 42
checkpoint_dir: runs
checkpoint_every: 500_000
log_every: 1

# Value-function warmup: freeze policy for the first N PPO updates while the
# value function catches up. Only relevant when using --bc-pretrain-file /
# --collect-demos. Set to 0 for pure random-init PPO.
vf_warmup_updates: 20      # ~20 rollouts of value-only training (~5-10 min at n_envs=4)

policy:
  entity_dim: 128
  proj_dim: 128
  pickup_dim: 64
  trunk_dim: 512
  gru_dim: 512

# Reward tuning — aggressive dense shaping for fast learning on limited compute.
# All fields optional; unset falls back to RewardConfig defaults in reward.py.
#
# 2026-07-02: adjusted after observing bot corner-camping local optimum at 700K
# steps. Bigger idle penalty + smaller passive HP/kite rewards flip camping
# from +0.007/tick (rewarded) to -0.025/tick (actively costs reward). Combined
# with higher entropy coefficient, bot should escape the corner attractor over
# the next few hundred thousand steps.
reward:
  # Base per-step cost.
  r_step: -0.003

  # Boosted room/exploration rewards to make progress more attractive.
  # r_new_room was 0.2 — tripled to 1.0 because "finish room, go to next" is
  # the core loop and needs to feel very rewarding. Combined with the new
  # r_seek_door_when_clear (dense signal for moving toward exits), this
  # solves the "circle in cleared room" problem the user observed.
  r_room_clear: 2.0
  r_new_room: 1.0                  # was 0.2 — 5x boost, main exploration carrot
  r_room_clear_speed_bonus: 1.0
  r_room_clear_no_damage: 1.5

  # Door-seeking: DISABLED. Turned this off after user reported bot walking
  # into walls at 50K steps. Root cause: door-seeking is rare in demos (~5%
  # of ticks are in cleared rooms), so BC has few examples of the "seek an
  # open door" pattern. In new rooms with different door layouts, BC
  # predictions are wrong, PPO amplifies the errors (classic distribution
  # shift / compounding-error problem in BC — see Ross & Bagnell 2010).
  # Set r_seek_door_when_clear > 0 to re-enable once you have time to
  # collect 500K+ demos and run 30+ BC epochs.
  r_seek_door_when_clear: 0.0

  # Aim alignment: still a hint, but reduced from 0.03. Aim reward doesnt
  # mean the tear will hit — enemies move, tears travel slowly. The REAL
  # signal is r_damage_dealt (per hit, dense) and r_kill (per kill, sparse).
  # Aim helps the initial exploration phase by pointing the policy toward
  # productive shot directions; once damage_dealt fires reliably, aim can be
  # smaller.
  r_aim_at_enemy: 0.015           # was 0.03 — reduced now that damage reward carries more weight
  # REMOVED: r_shoot_when_enemy_visible — was rewarding tear spam. Bot could
  # fire in random directions and still collect this reward whenever any enemy
  # was on screen. Bad shaping.
  r_shoot_when_enemy_visible: 0.0

  # BUMPED: damage_dealt scale from 0.1 to 0.2 — hitting enemies should
  # dominate the shooting-related rewards. This makes actual accuracy matter
  # more than shot intent.
  r_damage_dealt_scale: 0.2       # was 0.1
  max_damage_reward_per_room: 6.0  # was 3.0 — raised proportionally so cap doesnt bite too early

  # Engagement distance — REDUCED because it accidentally rewarded corner-camping
  # (enemies wander into range while bot stays still). Small enough to still
  # nudge good positioning but not enough to make idling profitable.
  r_at_kite_dist_tick: 0.001    # was 0.005
  kite_dist_min: 100.0
  kite_dist_max: 300.0

  # HP preservation — REDUCED for same reason: full-HP is easy in a corner where
  # nothing can reach the bot. Kept slightly positive so proactive dodging is
  # still incentivised, but not enough to reward camping.
  r_full_hp_tick: 0.001         # was 0.005

  # Anti-idle — BUMPED AGAIN. Was -0.03, now -0.1. User report of policy
  # collapse to "stand still" at 1M steps: bot found a camping spot where
  # enemies couldn't reach and the -0.03/tick penalty was less painful than
  # -10 terminal death. Bumping to -0.1 makes idling worth ~-10 present
  # value at gamma=0.99 (over infinite time), matching death magnitude.
  r_idle_penalty: -0.1           # was -0.03 (was -0.01)
  idle_speed_threshold: 0.5

  # Anti-camping (position-based). Also bumped: -0.02 -> -0.08 for same reason
  # as idle_penalty above. Catches bots that jitter enough to defeat idle_penalty.
  r_stationary_penalty: -0.08    # was -0.02
  stationary_radius: 40.0
  stationary_window: 45

  # PBRS approach potential (provably policy-invariant).
  r_pbrs_scale: 0.1
  pbrs_gamma: 0.99
  pbrs_ideal_dist: 200.0
  pbrs_decay: 200.0

